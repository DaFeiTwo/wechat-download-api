<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - WeChat Download API</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-muted: #8c8c8c;
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --border-light: #f0f0f0;
            --border-base: #d9d9d9;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius-base: 8px;
            --radius-large: 12px;
            --font-xs: 12px;
            --font-sm: 14px;
            --font-base: 16px;
            --font-lg: 20px;
            --font-xl: 24px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --duration-fast: 200ms;
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .layout {
            max-width: 780px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
        }

        .top-bar a {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color var(--duration-fast) var(--ease-in-out);
        }

        .top-bar a:hover { color: var(--primary-color); }

        .top-bar .right-links {
            display: flex;
            gap: var(--space-md);
        }

        .top-bar .right-links a {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        /* Article container */
        .article-container {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-light);
            overflow: hidden;
        }

        .article-header {
            padding: var(--space-xl) var(--space-xl) var(--space-lg);
        }

        .article-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: var(--space-md);
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .article-source {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .article-source img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border-light);
        }

        .article-source .info .name {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-source .info .author {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .article-meta .time {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        /* ---- Mark actions (收藏 / 待看) ---- */
        .mark-actions {
            display: inline-flex;
            gap: var(--space-sm);
            margin-left: auto;
            align-items: center;
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: var(--radius-base);
            font-size: var(--font-xs);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-base);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--duration-fast) var(--ease-in-out);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            line-height: 1;
        }

        .btn-sm:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-sm:disabled {
            cursor: default;
            opacity: 0.75;
        }

        .mark-btn {
            min-width: 76px;
        }

        .mark-btn .mark-icon {
            font-size: 13px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
        }

        .mark-btn .mark-text {
            font-size: var(--font-xs);
            line-height: 1;
        }

        /* Loading state (initial DOM state before GET /marks returns) */
        .mark-btn[data-state="loading"] {
            color: var(--text-muted);
            border-color: var(--border-light);
        }

        .mark-btn .mark-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            flex-shrink: 0;
        }

        /* 收藏 - 未收藏（线框态） */
        .mark-btn-fav[data-state="off"] {
            background: var(--bg-primary);
            border-color: var(--border-base);
            color: var(--text-secondary);
        }

        .mark-btn-fav[data-state="off"]:hover:not(:disabled) {
            border-color: #faad14;
            color: #faad14;
        }

        /* 收藏 - 已收藏（填充态） */
        .mark-btn-fav[data-state="on"] {
            background: #fff7e6;
            border-color: #faad14;
            color: #d48806;
        }

        .mark-btn-fav[data-state="on"]:hover:not(:disabled) {
            background: #ffe7ba;
            border-color: #d48806;
            color: #ad6800;
        }

        /* 待看 - 未加入待看（线框态） */
        .mark-btn-watch[data-state="off"] {
            background: var(--bg-primary);
            border-color: var(--border-base);
            color: var(--text-secondary);
        }

        .mark-btn-watch[data-state="off"]:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 待看 - 已加入待看（填充态） */
        .mark-btn-watch[data-state="on"] {
            background: #e6f7ff;
            border-color: var(--primary-color);
            color: #096dd9;
        }

        .mark-btn-watch[data-state="on"]:hover:not(:disabled) {
            background: #bae7ff;
            border-color: #096dd9;
            color: #0050b3;
        }

        /* ---- Mark toast (右上角提示) ---- */
        .mark-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            min-width: 240px;
            max-width: 360px;
            padding: 12px 14px 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-base);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: var(--font-sm);
            color: var(--text-primary);
            opacity: 0;
            transform: translateY(-12px);
            transition: opacity 240ms var(--ease-in-out), transform 240ms var(--ease-in-out);
        }

        .mark-toast[hidden] {
            display: none !important;
        }

        .mark-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .mark-toast-msg {
            flex: 1;
            word-break: break-word;
            line-height: 1.5;
        }

        .mark-toast-close {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            padding: 0;
            line-height: 1;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color var(--duration-fast) var(--ease-in-out),
                        background var(--duration-fast) var(--ease-in-out);
        }

        .mark-toast-close:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        /* Content */
        .article-content {
            padding: 0 var(--space-xl) var(--space-xl);
            font-size: var(--font-base);
            line-height: 1.8;
            color: #333;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-base);
            margin: var(--space-md) 0;
            cursor: zoom-in;
            transition: opacity var(--duration-fast) var(--ease-in-out);
        }

        .article-content img:hover {
            opacity: 0.85;
        }

        /* Image Lightbox */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s var(--ease-in-out), visibility 0.3s;
            cursor: zoom-out;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        .lightbox-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 92vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: var(--radius-base);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: scale(0.92);
            transition: transform 0.3s var(--ease-in-out);
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            line-height: 1;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--font-xs);
            pointer-events: none;
            user-select: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            line-height: 1;
            opacity: 0.7;
            user-select: none;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.25);
            opacity: 1;
        }

        .lightbox-nav:disabled {
            opacity: 0.15;
            cursor: default;
            pointer-events: none;
        }

        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }

        .lightbox-counter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: var(--font-sm);
            pointer-events: none;
            user-select: none;
        }

        @media (max-width: 768px) {
            .lightbox-nav { width: 36px; height: 36px; font-size: 18px; }
            .lightbox-prev { left: 8px; }
            .lightbox-next { right: 8px; }
        }

        .article-content p {
            margin-bottom: var(--space-md);
        }

        .article-content h1, .article-content h2, .article-content h3 {
            margin-top: var(--space-lg);
            margin-bottom: var(--space-md);
        }

        .article-content a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .article-content a:hover {
            text-decoration: underline;
        }

        .article-content blockquote {
            border-left: 3px solid var(--border-base);
            padding-left: var(--space-md);
            color: var(--text-secondary);
            margin: var(--space-md) 0;
        }

        .article-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-base);
            padding: var(--space-md);
            overflow-x: auto;
            font-size: var(--font-sm);
            margin: var(--space-md) 0;
        }

        .article-content code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .article-content pre code {
            background: none;
            padding: 0;
        }

        /* Empty content fallback */
        .article-empty {
            padding: var(--space-xl);
            text-align: center;
            color: var(--text-muted);
        }

        .article-empty .icon { font-size: 48px; margin-bottom: var(--space-md); }

        .article-empty a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .article-empty a:hover { text-decoration: underline; }

        /* Footer bar */
        .article-footer-bar {
            padding: var(--space-lg) var(--space-xl);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .article-footer-bar a {
            font-size: var(--font-sm);
            color: var(--primary-color);
            text-decoration: none;
        }

        .article-footer-bar a:hover { text-decoration: underline; }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 80px var(--space-lg);
            color: var(--text-muted);
            font-size: var(--font-sm);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .footer a { color: var(--text-muted); text-decoration: none; transition: color var(--duration-fast); }
        .footer a:hover { color: var(--primary-color); }
        .footer-links { display: flex; gap: var(--space-md); }

        @media (max-width: 768px) {
            .layout { padding: var(--space-lg) var(--space-md); }
            .article-header { padding: var(--space-lg) var(--space-md) var(--space-md); }
            .article-content { padding: 0 var(--space-md) var(--space-lg); }
            .article-title { font-size: var(--font-lg); }
            .article-footer-bar { padding: var(--space-md); }
            .mark-actions { margin-left: 0; width: 100%; }
            .mark-toast { top: 12px; right: 12px; left: 12px; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="top-bar">
            <a href="/reader.html">← 返回文章列表</a>
            <div class="right-links">
                <a href="/rss.html">RSS 管理</a>
                <a href="/admin.html">管理面板</a>
            </div>
        </div>

        <div class="article-container" id="articleContainer">
            <div class="loading-state"><span class="loading-spinner"></span>加载中...</div>
        </div>

        <div class="footer">
            <span>WeChat Download API v1.0.0</span>
            <div class="footer-links">
                <a href="/reader.html">文章阅读</a>
                <a href="/rss.html">RSS 管理</a>
                <a href="/admin.html">管理面板</a>
            </div>
        </div>
    </div>

    <!-- 标记操作提示 Toast (最小显示 3 秒，支持手动关闭) -->
    <div id="markToast" class="mark-toast" role="status" aria-live="polite" hidden>
        <span class="mark-toast-msg"></span>
        <button type="button" class="mark-toast-close" aria-label="关闭">×</button>
    </div>

    <script>
        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '';
            var d = new Date(ts * 1000);
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var min = String(d.getMinutes()).padStart(2, '0');
            return y + '-' + m + '-' + day + ' ' + h + ':' + min;
        }

        function getArticleId() {
            var params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function renderArticle(a) {
            var container = document.getElementById('articleContainer');
            document.title = a.title + ' - WeChat Download API';

            var html = '';

            // Header
            html += '<div class="article-header">';
            html += '<h1 class="article-title">' + escHtml(a.title) + '</h1>';
            html += '<div class="article-meta">';
            html += '<div class="article-source">';
            if (a.head_img) {
                html += '<img src="' + escHtml(a.head_img) + '" alt="" onerror="this.style.display=\'none\'">';
            }
            html += '<div class="info">';
            html += '<div class="name">' + escHtml(a.nickname || '') + '</div>';
            if (a.author) {
                html += '<div class="author">' + escHtml(a.author) + '</div>';
            }
            html += '</div></div>';
            if (a.publish_time) {
                html += '<span class="time">' + formatTime(a.publish_time) + '</span>';
            }
            // 收藏 / 待看 操作按钮（初始 disabled + loading，待 initMarks 解除禁用与渲染状态）
            html += '<div class="mark-actions">';
            html += '<button id="favBtn" type="button" class="btn-sm mark-btn mark-btn-fav" data-state="loading" disabled aria-label="收藏">';
            html += '<span class="mark-spinner" aria-hidden="true"></span>';
            html += '<span class="mark-text">收藏</span>';
            html += '</button>';
            html += '<button id="watchBtn" type="button" class="btn-sm mark-btn mark-btn-watch" data-state="loading" disabled aria-label="待看">';
            html += '<span class="mark-spinner" aria-hidden="true"></span>';
            html += '<span class="mark-text">待看</span>';
            html += '</button>';
            html += '</div>';
            html += '</div></div>';

            // Content
            if (a.content) {
                html += '<div class="article-content">' + a.content + '</div>';
            } else {
                html += '<div class="article-empty">';
                html += '<div class="icon">📄</div>';
                html += '<p>正文内容暂未抓取</p>';
                if (a.digest) {
                    html += '<p style="margin-top:12px;color:var(--text-secondary);font-size:var(--font-sm);">' + escHtml(a.digest) + '</p>';
                }
                html += '<p style="margin-top:16px;"><a href="' + escHtml(a.link) + '" target="_blank">前往微信阅读原文 →</a></p>';
                html += '</div>';
            }

            // Footer bar
            html += '<div class="article-footer-bar">';
            html += '<a href="' + escHtml(a.link) + '" target="_blank">查看微信原文 ↗</a>';
            html += '<a href="/reader.html">返回列表</a>';
            html += '</div>';

            container.innerHTML = html;
        }

        async function loadArticle() {
            var id = getArticleId();
            if (!id) {
                document.getElementById('articleContainer').innerHTML = '<div class="article-empty"><div class="icon">⚠️</div><p>缺少文章 ID 参数</p><p style="margin-top:12px;"><a href="/reader.html">返回文章列表</a></p></div>';
                return;
            }

            try {
                var res = await fetch('/api/rss/article/' + encodeURIComponent(id));
                if (!res.ok) {
                    throw new Error('文章不存在 (HTTP ' + res.status + ')');
                }
                var d = await res.json();
                if (!d.success || !d.data) {
                    throw new Error(d.detail || '加载失败');
                }
                renderArticle(d.data);
            } catch (e) {
                document.getElementById('articleContainer').innerHTML = '<div class="article-empty"><div class="icon">⚠️</div><p>' + escHtml(e.message) + '</p><p style="margin-top:12px;"><a href="/reader.html">返回文章列表</a></p></div>';
            }
        }

        async function loadArticleAndInitMarks() {
            await loadArticle();
            // 仅当按钮已被渲染（loadArticle 成功）时才调用；parseIdOrAbort 在 id 非法时会 toast 并返回 null
            if (!document.getElementById('favBtn')) return;
            var id = parseIdOrAbort();
            if (id == null) return;
            await initMarks(id);
        }

        /* ============================================================
         * Mark utilities: parseIdOrAbort / fetchWithTimeout / showErrorToast
         * （任务 5.2：通用工具函数。事件绑定与 initMarks 见本区块下方）
         * ============================================================ */

        // 统一读取 #markToast 容器；获取不到时所有 toast 调用静默降级。
        function _getMarkToastEls() {
            var toast = document.getElementById('markToast');
            if (!toast) return null;
            return {
                toast: toast,
                msg: toast.querySelector('.mark-toast-msg'),
                close: toast.querySelector('.mark-toast-close')
            };
        }

        var _markToastHideTimer = null;
        var _markToastCloseBound = false;

        function _hideMarkToast() {
            var els = _getMarkToastEls();
            if (!els) return;
            if (_markToastHideTimer) {
                clearTimeout(_markToastHideTimer);
                _markToastHideTimer = null;
            }
            els.toast.classList.remove('show');
            // CSS transition 约 240ms；结束后彻底隐藏（避免 AT 仍读出残留节点）
            setTimeout(function() {
                if (!els.toast.classList.contains('show')) {
                    els.toast.hidden = true;
                }
            }, 260);
        }

        /**
         * 渲染错误 toast 至 #markToast，至少显示 3 秒。
         * 覆盖策略：连续调用时覆盖当前内容 + 重置 3s 计时器，避免堆叠。
         * 关闭按钮点击时立即隐藏。
         * @param {string} msg 要展示的错误消息
         */
        function showErrorToast(msg) {
            var els = _getMarkToastEls();
            if (!els) return;

            if (els.msg) els.msg.textContent = msg == null ? '' : String(msg);

            // 关闭按钮只绑定一次（幂等）
            if (els.close && !_markToastCloseBound) {
                els.close.addEventListener('click', function() {
                    _hideMarkToast();
                });
                _markToastCloseBound = true;
            }

            // 覆盖策略：清除旧的自动隐藏定时器
            if (_markToastHideTimer) {
                clearTimeout(_markToastHideTimer);
                _markToastHideTimer = null;
            }

            els.toast.hidden = false;
            // 强制 reflow，使重复调用时 .show 的 transition 能重新触发
            void els.toast.offsetHeight;
            els.toast.classList.add('show');

            _markToastHideTimer = setTimeout(function() {
                _hideMarkToast();
            }, 3000);
        }

        /**
         * 从 URLSearchParams 读取 id。缺失 / 空串 / 非纯数字 / 非正整数均视为非法：
         *   - 保持 #favBtn / #watchBtn 为 disabled（若已渲染）
         *   - 调用 showErrorToast('文章标识无效')
         *   - 返回 null
         * 合法时返回 Number(id)。
         */
        function parseIdOrAbort() {
            var params = new URLSearchParams(window.location.search);
            var s = params.get('id');
            var valid = true;
            if (s === null || s === '') {
                valid = false;
            } else if (!/^\d+$/.test(s)) {
                valid = false;
            } else {
                var n = Number(s);
                if (!(n > 0)) valid = false;
            }

            if (!valid) {
                var favBtn = document.getElementById('favBtn');
                var watchBtn = document.getElementById('watchBtn');
                if (favBtn) favBtn.disabled = true;
                if (watchBtn) watchBtn.disabled = true;
                showErrorToast('文章标识无效');
                return null;
            }
            return Number(s);
        }

        /**
         * 带超时的 fetch。基于 AbortController 实现 10s 默认超时。
         *   - 超时：抛 Error('请求超时')
         *   - 网络失败：抛 Error('网络错误')
         *   - HTTP 非 2xx：抛 Error('HTTP ' + status)
         *   - 成功：resolve(response)
         * @param {string} url
         * @param {RequestInit} [options]
         * @param {number} [timeoutMs=10000]
         * @returns {Promise<Response>}
         */
        async function fetchWithTimeout(url, options, timeoutMs) {
            if (timeoutMs == null) timeoutMs = 10000;
            var controller = new AbortController();
            var timedOut = false;
            var timer = setTimeout(function() {
                timedOut = true;
                controller.abort();
            }, timeoutMs);

            var mergedOptions = Object.assign({}, options || {}, { signal: controller.signal });

            var response;
            try {
                response = await fetch(url, mergedOptions);
            } catch (err) {
                clearTimeout(timer);
                if (timedOut || (err && err.name === 'AbortError')) {
                    throw new Error('请求超时');
                }
                throw new Error('网络错误');
            }
            clearTimeout(timer);

            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            return response;
        }

        /* ============================================================
         * Mark state rendering & click handlers (任务 5.3)
         * ============================================================ */

        // 更新按钮视觉状态：state ∈ {'on', 'off', 'loading'}
        function _renderMarkBtn(btn, kind, state) {
            if (!btn) return;
            btn.setAttribute('data-state', state);
            var iconChar = '';
            var text = '';
            if (kind === 'fav') {
                iconChar = (state === 'on') ? '★' : '☆';
                text = (state === 'on') ? '已收藏' : '收藏';
            } else {
                iconChar = '⏱';
                text = (state === 'on') ? '已加入待看' : '待看';
            }

            if (state === 'loading') {
                btn.innerHTML = '<span class="mark-spinner" aria-hidden="true"></span>'
                    + '<span class="mark-text">' + text + '</span>';
            } else {
                btn.innerHTML = '<span class="mark-icon" aria-hidden="true">' + iconChar + '</span>'
                    + '<span class="mark-text">' + text + '</span>';
            }
        }

        // 当前文章的标记状态（由 initMarks 初始化，点击处理器读写）
        var _markCurrentId = null;
        var _markState = { favorite: false, watchlist: false };

        async function _toggleMark(kind) {
            if (_markCurrentId == null) return;
            var btn = document.getElementById(kind === 'fav' ? 'favBtn' : 'watchBtn');
            if (!btn || btn.disabled) return;

            var currentKey = (kind === 'fav') ? 'favorite' : 'watchlist';
            var current = !!_markState[currentKey];
            var target = !current;
            var endpoint = (kind === 'fav') ? 'favorite' : 'watchlist';
            var method = target ? 'PUT' : 'DELETE';

            // 立即进入 loading 态，避免双击
            btn.disabled = true;
            _renderMarkBtn(btn, kind, 'loading');

            try {
                await fetchWithTimeout(
                    '/api/rss/article/' + _markCurrentId + '/' + endpoint,
                    { method: method }
                );
                // 成功：翻转状态
                _markState[currentKey] = target;
                _renderMarkBtn(btn, kind, target ? 'on' : 'off');
                btn.disabled = false;
            } catch (err) {
                // 失败：还原到请求前的视觉状态
                _renderMarkBtn(btn, kind, current ? 'on' : 'off');
                btn.disabled = false;
                showErrorToast((err && err.message) ? err.message : '操作失败');
            }
        }

        function onClickFavorite() { return _toggleMark('fav'); }
        function onClickWatchlist() { return _toggleMark('watch'); }

        /**
         * 初始化按钮标记状态：GET /api/rss/article/{id}/marks
         * - 成功：渲染视觉、解除 disabled、绑定点击
         * - 失败：保持 disabled，showErrorToast
         */
        async function initMarks(id) {
            var favBtn = document.getElementById('favBtn');
            var watchBtn = document.getElementById('watchBtn');
            if (!favBtn || !watchBtn) return;

            _markCurrentId = id;

            try {
                var res = await fetchWithTimeout('/api/rss/article/' + id + '/marks');
                var d = await res.json();
                if (!d || d.success !== true || !d.data) {
                    throw new Error('加载标记状态失败');
                }
                _markState.favorite = !!d.data.favorite;
                _markState.watchlist = !!d.data.watchlist;

                _renderMarkBtn(favBtn, 'fav', _markState.favorite ? 'on' : 'off');
                _renderMarkBtn(watchBtn, 'watch', _markState.watchlist ? 'on' : 'off');
                favBtn.disabled = false;
                watchBtn.disabled = false;

                favBtn.onclick = onClickFavorite;
                watchBtn.onclick = onClickWatchlist;
            } catch (err) {
                // 保持 disabled + loading
                showErrorToast((err && err.message) ? err.message : '加载标记状态失败');
            }
        }

        window.addEventListener('load', loadArticleAndInitMarks);

        /* ---- Image Lightbox ---- */
        (function() {
            // Create overlay
            var overlay = document.createElement('div');
            overlay.className = 'lightbox-overlay';
            overlay.innerHTML = '<button class="lightbox-close" title="关闭">✕</button>'
                + '<button class="lightbox-nav lightbox-prev" title="上一张 (←)">‹</button>'
                + '<button class="lightbox-nav lightbox-next" title="下一张 (→)">›</button>'
                + '<img class="lightbox-img" src="" alt="">'
                + '<span class="lightbox-counter"></span>'
                + '<span class="lightbox-hint">← → 切换 · 滚轮缩放 · 拖拽移动 · 点击空白关闭</span>';
            document.body.appendChild(overlay);

            var lbImg = overlay.querySelector('.lightbox-img');
            var btnPrev = overlay.querySelector('.lightbox-prev');
            var btnNext = overlay.querySelector('.lightbox-next');
            var counter = overlay.querySelector('.lightbox-counter');
            var scale = 1;
            var translateX = 0, translateY = 0;
            var isDragging = false;
            var startX, startY, lastTX, lastTY;

            // Image list tracking
            var imageList = [];
            var currentIndex = 0;

            function getArticleImages() {
                var contentEl = document.querySelector('.article-content');
                if (!contentEl) return [];
                return Array.prototype.slice.call(contentEl.querySelectorAll('img'));
            }

            function updateNav() {
                btnPrev.disabled = currentIndex <= 0;
                btnNext.disabled = currentIndex >= imageList.length - 1;
                counter.textContent = imageList.length > 1 ? (currentIndex + 1) + ' / ' + imageList.length : '';
            }

            function applyTransform() {
                lbImg.style.transform = 'scale(' + scale + ') translate(' + (translateX / scale) + 'px,' + (translateY / scale) + 'px)';
            }

            function resetTransform() {
                scale = 1; translateX = 0; translateY = 0;
                lbImg.style.transform = '';
            }

            function showImage(index) {
                if (index < 0 || index >= imageList.length) return;
                currentIndex = index;
                resetTransform();
                lbImg.src = imageList[currentIndex].src;
                updateNav();
            }

            function openLightbox(imgEl) {
                imageList = getArticleImages();
                currentIndex = imageList.indexOf(imgEl);
                if (currentIndex === -1) currentIndex = 0;
                resetTransform();
                lbImg.src = imgEl.src;
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                updateNav();
            }

            function closeLightbox() {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                isDragging = false;
            }

            // Nav buttons
            btnPrev.addEventListener('click', function(e) {
                e.stopPropagation();
                showImage(currentIndex - 1);
            });

            btnNext.addEventListener('click', function(e) {
                e.stopPropagation();
                showImage(currentIndex + 1);
            });

            // Delegate click on article images
            document.addEventListener('click', function(e) {
                var img = e.target;
                if (img.tagName === 'IMG' && img.closest('.article-content')) {
                    e.preventDefault();
                    openLightbox(img);
                }
            });

            // Close on overlay / close button click (but not on the image itself when zoomed)
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target.classList.contains('lightbox-close')) {
                    closeLightbox();
                } else if (e.target === lbImg && scale <= 1) {
                    closeLightbox();
                }
            });

            // Keyboard: ESC close, ← → switch
            document.addEventListener('keydown', function(e) {
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
                else if (e.key === 'ArrowRight') showImage(currentIndex + 1);
            });

            // Scroll wheel zoom
            overlay.addEventListener('wheel', function(e) {
                e.preventDefault();
                var delta = e.deltaY > 0 ? -0.15 : 0.15;
                scale = Math.min(Math.max(scale + delta, 0.5), 5);
                if (scale <= 1) { translateX = 0; translateY = 0; }
                applyTransform();
            }, { passive: false });

            // Drag to pan (when zoomed)
            lbImg.addEventListener('mousedown', function(e) {
                if (scale > 1) {
                    isDragging = true;
                    startX = e.clientX; startY = e.clientY;
                    lastTX = translateX; lastTY = translateY;
                    lbImg.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                translateX = lastTX + (e.clientX - startX);
                translateY = lastTY + (e.clientY - startY);
                applyTransform();
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    lbImg.style.cursor = '';
                }
            });

            // Touch support for mobile
            var touchStartDist = 0, touchStartScale = 1;

            overlay.addEventListener('touchstart', function(e) {
                if (e.touches.length === 2) {
                    var dx = e.touches[0].clientX - e.touches[1].clientX;
                    var dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDist = Math.sqrt(dx * dx + dy * dy);
                    touchStartScale = scale;
                } else if (e.touches.length === 1 && scale > 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    lastTX = translateX; lastTY = translateY;
                }
            }, { passive: true });

            overlay.addEventListener('touchmove', function(e) {
                if (e.touches.length === 2 && touchStartDist) {
                    e.preventDefault();
                    var dx = e.touches[0].clientX - e.touches[1].clientX;
                    var dy = e.touches[0].clientY - e.touches[1].clientY;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    scale = Math.min(Math.max(touchStartScale * (dist / touchStartDist), 0.5), 5);
                    if (scale <= 1) { translateX = 0; translateY = 0; }
                    applyTransform();
                } else if (isDragging && e.touches.length === 1) {
                    translateX = lastTX + (e.touches[0].clientX - startX);
                    translateY = lastTY + (e.touches[0].clientY - startY);
                    applyTransform();
                }
            }, { passive: false });

            overlay.addEventListener('touchend', function() {
                isDragging = false;
                touchStartDist = 0;
            });
        })();
    </script>
</body>
</html>
