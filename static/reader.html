<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 - WeChat Download API</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --success-color: #52c41a;
            --warning-color: #fa8c16;
            --error-color: #ff4d4f;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-muted: #8c8c8c;
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --border-light: #f0f0f0;
            --border-base: #d9d9d9;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-base: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.1);
            --radius-base: 8px;
            --radius-large: 12px;
            --font-xs: 12px;
            --font-sm: 14px;
            --font-base: 16px;
            --font-lg: 20px;
            --font-xl: 24px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --duration-fast: 200ms;
            --duration-normal: 300ms;
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .layout {
            max-width: 1080px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
        }

        .header-left h1 {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-left p {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            margin-top: var(--space-xs);
        }

        .header-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: var(--radius-base);
            font-size: var(--font-xs);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-base);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--duration-fast) var(--ease-in-out);
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-sm:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-sm.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* Filter bar */
        .filter-bar {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-light);
            padding: var(--space-md) var(--space-lg);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .filter-bar .label {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            font-weight: 600;
            flex-shrink: 0;
        }

        .filter-tags {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-tag {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: var(--font-xs);
            cursor: pointer;
            border: 1px solid var(--border-base);
            background: var(--bg-primary);
            color: var(--text-secondary);
            transition: all var(--duration-fast) var(--ease-in-out);
            white-space: nowrap;
        }

        .filter-tag:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-tag.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* Article grid */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-lg);
        }

        /* Article card */
        .article-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-light);
            overflow: hidden;
            transition: all var(--duration-normal) var(--ease-in-out);
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .article-card a {
            text-decoration: none;
            color: inherit;
        }

        .article-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--border-light);
            display: block;
        }

        .article-cover-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 40px;
        }

        .article-body {
            padding: var(--space-md);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .article-title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: var(--space-sm);
        }

        .article-digest {
            font-size: var(--font-xs);
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            margin-bottom: var(--space-md);
        }

        .article-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-sm);
        }

        .article-source {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .article-source img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--border-light);
        }

        .article-source .name {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .article-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Empty & loading */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px var(--space-lg);
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: var(--space-md); }
        .empty-state .text { font-size: var(--font-sm); }

        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px var(--space-lg);
            color: var(--text-muted);
            font-size: var(--font-sm);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .footer a { color: var(--text-muted); text-decoration: none; transition: color var(--duration-fast); }
        .footer a:hover { color: var(--primary-color); }
        .footer-links { display: flex; gap: var(--space-md); }

        @media (max-width: 768px) {
            .layout { padding: var(--space-lg) var(--space-md); }
            .header { flex-direction: column; align-items: flex-start; gap: var(--space-sm); }
            .article-grid { grid-template-columns: 1fr; }
            .article-cover, .article-cover-placeholder { height: 160px; }
            .filter-bar { flex-direction: column; align-items: flex-start; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .article-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="header">
            <div class="header-left">
                <h1>文章阅读</h1>
                <p>浏览订阅公众号的最新文章</p>
            </div>
            <div class="header-actions">
                <a href="/admin.html" class="btn-sm">管理面板</a>
                <a href="/rss.html" class="btn-sm">RSS 管理</a>
            </div>
        </div>

        <div class="filter-bar">
            <span class="label">筛选</span>
            <div class="filter-tags" id="filterTags">
                <span class="filter-tag active" data-fakeid="" onclick="filterBy(this, '')">全部</span>
            </div>
        </div>

        <div class="article-grid" id="articleGrid">
            <div class="loading-state"><span class="loading-spinner"></span>加载中...</div>
        </div>

        <div class="footer">
            <span>WeChat Download API v1.0.0</span>
            <div class="footer-links">
                <a href="/admin.html">管理面板</a>
                <a href="/rss.html">RSS 管理</a>
                <a href="https://github.com/tmwgsicp/wechat-download-api" target="_blank">GitHub</a>
            </div>
        </div>
    </div>

    <script>
        var allArticles = [];
        var currentFakeid = '';

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '';
            var d = new Date(ts * 1000);
            var now = new Date();
            var diff = Math.floor((now - d) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';

            var m = d.getMonth() + 1;
            var day = d.getDate();
            if (d.getFullYear() === now.getFullYear()) {
                return m + '月' + day + '日';
            }
            return d.getFullYear() + '/' + m + '/' + day;
        }

        function renderArticles(articles) {
            var grid = document.getElementById('articleGrid');

            if (!articles || articles.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">暂无文章，请先添加订阅并等待轮询</div></div>';
                return;
            }

            var html = '';
            articles.forEach(function(a) {
                html += '<div class="article-card">';
                html += '<a href="' + escHtml(a.link) + '" target="_blank" rel="noopener">';

                if (a.cover) {
                    html += '<img class="article-cover" src="' + escHtml(a.cover) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=article-cover-placeholder>📄</div>\'">';
                } else {
                    html += '<div class="article-cover-placeholder">📄</div>';
                }

                html += '<div class="article-body">';
                html += '<div class="article-title">' + escHtml(a.title) + '</div>';

                if (a.digest) {
                    html += '<div class="article-digest">' + escHtml(a.digest) + '</div>';
                } else {
                    html += '<div class="article-digest" style="color:var(--border-base)">暂无摘要</div>';
                }

                html += '<div class="article-footer">';
                html += '<div class="article-source">';
                if (a.head_img) {
                    html += '<img src="' + escHtml(a.head_img) + '" alt="" onerror="this.style.display=\'none\'">';
                }
                html += '<span class="name">' + escHtml(a.nickname || '') + '</span>';
                html += '</div>';
                html += '<span class="article-time">' + formatTime(a.publish_time) + '</span>';
                html += '</div></div></a></div>';
            });

            grid.innerHTML = html;
        }

        function filterBy(el, fakeid) {
            currentFakeid = fakeid;

            var tags = document.querySelectorAll('.filter-tag');
            tags.forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');

            if (!fakeid) {
                renderArticles(allArticles);
            } else {
                var filtered = allArticles.filter(function(a) { return a.fakeid === fakeid; });
                renderArticles(filtered);
            }
        }

        async function loadArticles() {
            try {
                var res = await fetch('/api/rss/articles?limit=100');
                var d = await res.json();

                if (!d.success) {
                    document.getElementById('articleGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">加载失败</div></div>';
                    return;
                }

                allArticles = d.data || [];
                renderArticles(allArticles);

                // Build filter tags
                var seen = {};
                var sources = [];
                allArticles.forEach(function(a) {
                    if (a.fakeid && !seen[a.fakeid]) {
                        seen[a.fakeid] = true;
                        sources.push({ fakeid: a.fakeid, nickname: a.nickname || a.fakeid });
                    }
                });

                if (sources.length > 1) {
                    var tagsEl = document.getElementById('filterTags');
                    var tagsHtml = '<span class="filter-tag active" data-fakeid="" onclick="filterBy(this, \'\')">全部</span>';
                    sources.forEach(function(s) {
                        tagsHtml += '<span class="filter-tag" data-fakeid="' + escHtml(s.fakeid) + '" onclick="filterBy(this, \'' + escHtml(s.fakeid) + '\')">' + escHtml(s.nickname) + '</span>';
                    });
                    tagsEl.innerHTML = tagsHtml;
                }
            } catch (e) {
                document.getElementById('articleGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">网络错误: ' + escHtml(e.message) + '</div></div>';
            }
        }

        window.addEventListener('load', loadArticles);
    </script>
</body>
</html>
