<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 - WeChat Download API</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --success-color: #52c41a;
            --warning-color: #fa8c16;
            --error-color: #ff4d4f;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-muted: #8c8c8c;
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --border-light: #f0f0f0;
            --border-base: #d9d9d9;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-base: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.1);
            --radius-base: 8px;
            --radius-large: 12px;
            --font-xs: 12px;
            --font-sm: 14px;
            --font-base: 16px;
            --font-lg: 20px;
            --font-xl: 24px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --duration-fast: 200ms;
            --duration-normal: 300ms;
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .layout {
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }

        /* 主体两栏 */
        .main-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: var(--space-lg);
            align-items: start;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
        }

        .header-left h1 {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-left p {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            margin-top: var(--space-xs);
        }

        .header-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: var(--radius-base);
            font-size: var(--font-xs);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-base);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--duration-fast) var(--ease-in-out);
            white-space: nowrap;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-sm:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-sm.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* 未读按钮角标 */
        .btn-wrap {
            position: relative;
            display: inline-flex;
        }

        .btn-wrap .unread-count {
            position: absolute;
            top: -8px;
            right: -8px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: var(--error-color);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            line-height: 18px;
            text-align: center;
            cursor: pointer;
        }

        /* 竖向侧栏筛选 */
        .filter-sidebar {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-light);
            padding: var(--space-md);
            position: sticky;
            top: var(--space-lg);
            max-height: calc(100vh - 2 * var(--space-lg));
            overflow-y: auto;
        }

        .filter-sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md);
            padding: 0 var(--space-sm);
        }

        .filter-sidebar .label {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .sort-toggle {
            font-size: var(--font-xs);
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all var(--duration-fast) var(--ease-in-out);
            user-select: none;
        }

        .sort-toggle:hover { color: var(--primary-color); border-color: var(--border-light); }
        .sort-toggle.active { color: var(--primary-color); border-color: var(--primary-color); background: rgba(24, 144, 255, 0.06); }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 8px 12px;
            border-radius: var(--radius-base);
            font-size: var(--font-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-in-out);
            user-select: none;
            border: 1px solid transparent;
        }

        .filter-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
        .filter-item.active { background: var(--primary-color); color: #fff; }
        .filter-item.active .filter-item-count { color: rgba(255,255,255,0.85); }

        .filter-item-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .filter-item-count {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .filter-divider {
            height: 1px;
            background: var(--border-light);
            margin: var(--space-sm) var(--space-sm);
        }

        /* 拖拽手柄：只在"排序中"显示 */
        .drag-handle {
            color: var(--border-base);
            font-size: 14px;
            cursor: grab;
            flex-shrink: 0;
            display: none;
            user-select: none;
        }

        .filter-sidebar.sorting .filter-item.draggable .drag-handle { display: inline; }
        .filter-sidebar.sorting .filter-item.draggable {
            cursor: grab;
            background: var(--bg-secondary);
        }
        .filter-sidebar.sorting .filter-item.draggable:active { cursor: grabbing; }

        .filter-item.dragging {
            opacity: 0.4;
        }

        .filter-item.drag-over {
            border-top: 2px solid var(--primary-color);
        }

        /* Article grid */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-lg);
        }

        /* Article card */
        .article-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-light);
            overflow: hidden;
            transition: all var(--duration-normal) var(--ease-in-out);
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .article-card a {
            text-decoration: none;
            color: inherit;
        }

        .article-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--border-light);
            display: block;
        }

        .article-cover-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 40px;
        }

        .article-body {
            padding: var(--space-md);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .article-title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: var(--space-sm);
        }

        .article-digest {
            font-size: var(--font-xs);
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            margin-bottom: var(--space-md);
        }

        .article-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-sm);
        }

        .article-source {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .article-source img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--border-light);
        }

        .article-source .name {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .article-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Card badges */
        .card-badges {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-xs);
            line-height: 1;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-favorite {
            background: rgba(250, 140, 22, 0.1);
            color: var(--warning-color);
        }

        .badge-watchlist {
            background: rgba(24, 144, 255, 0.1);
            color: var(--primary-color);
        }

        /* Empty & loading */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px var(--space-lg);
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: var(--space-md); }
        .empty-state .text { font-size: var(--font-sm); }

        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px var(--space-lg);
            color: var(--text-muted);
            font-size: var(--font-sm);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-base);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: var(--font-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-in-out);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover:not(.disabled):not(.active) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .page-btn.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .page-btn.disabled {
            color: var(--border-base);
            cursor: not-allowed;
        }

        .page-ellipsis {
            color: var(--text-muted);
            font-size: var(--font-sm);
            padding: 0 4px;
        }

        .page-info {
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-left: var(--space-sm);
        }

        /* Footer */
        .footer {
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .footer a { color: var(--text-muted); text-decoration: none; transition: color var(--duration-fast); }
        .footer a:hover { color: var(--primary-color); }
        .footer-links { display: flex; gap: var(--space-md); }

        @media (max-width: 768px) {
            .layout { padding: var(--space-lg) var(--space-md); }
            .header { flex-direction: column; align-items: flex-start; gap: var(--space-sm); }
            .main-grid { grid-template-columns: 1fr; }
            .filter-sidebar {
                position: static;
                max-height: 200px;
            }
            .filter-list {
                flex-direction: row;
                flex-wrap: wrap;
                gap: var(--space-xs);
            }
            .filter-item {
                padding: 4px 14px;
                border: 1px solid var(--border-base);
                border-radius: 20px;
                font-size: var(--font-xs);
            }
            .filter-divider { display: none; }
            .filter-item-count { display: none; }
            .article-grid { grid-template-columns: 1fr; }
            .article-cover, .article-cover-placeholder { height: 160px; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .main-grid { grid-template-columns: 200px 1fr; }
            .article-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* 自定义确认弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: var(--radius-large);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            padding: var(--space-lg);
            max-width: 360px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-size: var(--font-base);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }

        .modal-desc {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }

        .modal-actions {
            display: flex;
            gap: var(--space-sm);
            justify-content: center;
        }

        .modal-actions button {
            padding: 8px 28px;
            border-radius: var(--radius-base);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-in-out);
        }

        .modal-cancel {
            border: 1px solid var(--border-base);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-cancel:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .modal-confirm {
            border: none;
            background: var(--primary-color);
            color: #fff;
        }

        .modal-confirm:hover {
            background: #096dd9;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="header">
            <div class="header-left">
                <h1>文章阅读</h1>
                <p>浏览订阅公众号的最新文章</p>
            </div>
            <div class="header-actions">
                <span class="btn-wrap">
                    <button class="btn-sm" id="unreadBtn" onclick="toggleUnread()">筛选未读</button>
                    <span class="unread-count" id="unreadCount" style="display:none" onclick="markCurrentRead()"></span>
                </span>
                <a href="/admin.html" class="btn-sm">管理面板</a>
                <a href="/rss.html" class="btn-sm">RSS 管理</a>
            </div>
        </div>

        <div class="main-grid">
            <aside class="filter-sidebar" id="filterSidebar">
                <div class="filter-sidebar-header">
                    <span class="label">筛选</span>
                    <span class="sort-toggle" id="sortToggle" onclick="toggleSortMode()" title="开启后可拖动排序">排序</span>
                </div>
                <div class="filter-list" id="filterList">
                    <div class="filter-item active" data-fakeid="" onclick="filterBy(this, '')">
                        <span class="filter-item-name">全部</span>
                    </div>
                </div>
            </aside>

            <div>
                <div class="article-grid" id="articleGrid">
                    <div class="loading-state"><span class="loading-spinner"></span>加载中...</div>
                </div>

                <div id="pagination"></div>
            </div>
        </div>

        <div class="footer">
            <span>WeChat Download API v1.0.0</span>
            <div class="footer-links">
                <a href="/admin.html">管理面板</a>
                <a href="/rss.html">RSS 管理</a>
                <a href="https://github.com/tmwgsicp/wechat-download-api" target="_blank">GitHub</a>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title">标记已读</div>
            <div class="modal-desc" id="modalDesc">确定将当前文章全部标记为已读？</div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeModal()">取消</button>
                <button class="modal-confirm" onclick="confirmMarkRead()">确定</button>
            </div>
        </div>
    </div>

    <script>
        var allArticles = [];
        var currentFakeid = '';
        var standaloneOnly = false;
        var showUnreadOnly = false;
        var allSources = [];
        var currentPage = 1;
        var totalPages = 1;
        var totalArticles = 0;
        var PAGE_SIZE = 10;
        var currentFilter = '';
        var initialized = false;

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '';
            var d = new Date(ts * 1000);
            var now = new Date();
            var diff = Math.floor((now - d) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';

            var m = d.getMonth() + 1;
            var day = d.getDate();
            if (d.getFullYear() === now.getFullYear()) {
                return m + '月' + day + '日';
            }
            return d.getFullYear() + '/' + m + '/' + day;
        }

        function renderArticles(articles) {
            var grid = document.getElementById('articleGrid');

            if (!articles || articles.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">暂无文章，请先添加订阅并等待轮询</div></div>';
                renderPagination();
                return;
            }

            var html = '';
            articles.forEach(function(a) {
                html += '<div class="article-card">';
                html += '<a href="/article.html?id=' + a.id + '">';

                if (a.cover) {
                    html += '<img class="article-cover" src="' + escHtml(a.cover) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=article-cover-placeholder>📄</div>\'">';
                } else {
                    html += '<div class="article-cover-placeholder">📄</div>';
                }

                html += '<div class="article-body">';
                html += '<div class="article-title">' + escHtml(a.title) + '</div>';

                if (a.digest) {
                    html += '<div class="article-digest">' + escHtml(a.digest) + '</div>';
                } else {
                    html += '<div class="article-digest" style="color:var(--border-base)">暂无摘要</div>';
                }

                html += '<div class="article-footer">';
                html += '<div class="article-source">';
                if (a.head_img) {
                    html += '<img src="' + escHtml(a.head_img) + '" alt="" onerror="this.style.display=\'none\'">';
                }
                html += '<span class="name">' + escHtml(a.nickname || '单篇下载') + '</span>';
                html += '</div>';
                html += '<span class="article-time">' + formatTime(a.publish_time) + '</span>';
                html += '</div>';

                // Card badges for favorite/watchlist status
                if (Boolean(a.is_favorite) || Boolean(a.is_watchlist)) {
                    html += '<div class="card-badges">';
                    if (Boolean(a.is_favorite)) {
                        html += '<span class="badge badge-favorite" title="已收藏" aria-label="已收藏">★</span>';
                    }
                    if (Boolean(a.is_watchlist)) {
                        html += '<span class="badge badge-watchlist" title="已加入待看" aria-label="已加入待看">⏱</span>';
                    }
                    html += '</div>';
                }

                html += '</div></a></div>';
            });

            grid.innerHTML = html;
            renderPagination();
        }

        function renderPagination() {
            var container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            var html = '<div class="pagination">';
            html += '<button class="page-btn' + (currentPage <= 1 ? ' disabled' : '') + '" onclick="goPage(' + (currentPage - 1) + ')"' + (currentPage <= 1 ? ' disabled' : '') + '>&laquo; 上一页</button>';

            // 页码按钮逻辑：显示当前页附近的页码
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                html += '<button class="page-btn" onclick="goPage(1)">1</button>';
                if (startPage > 2) html += '<span class="page-ellipsis">...</span>';
            }

            for (var i = startPage; i <= endPage; i++) {
                html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<span class="page-ellipsis">...</span>';
                html += '<button class="page-btn" onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
            }

            html += '<button class="page-btn' + (currentPage >= totalPages ? ' disabled' : '') + '" onclick="goPage(' + (currentPage + 1) + ')"' + (currentPage >= totalPages ? ' disabled' : '') + '>下一页 &raquo;</button>';
            html += '<span class="page-info">共 ' + totalArticles + ' 篇</span>';
            html += '</div>';
            container.innerHTML = html;
        }

        async function goPage(page) {
            if (page < 1 || page > totalPages || page === currentPage) return;
            currentPage = page;
            if (currentFilter === '__favorite__') {
                await fetchFavorites(currentPage);
            } else if (currentFilter === '__watchlist__') {
                await fetchWatchlist(currentPage);
            } else {
                await fetchArticles(currentFakeid, currentPage);
            }
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function filterBy(el, fakeid) {
            if (sortMode) return;  // 排序模式下点击不切换筛选

            // Clear active from all filter items
            var tags = document.querySelectorAll('.filter-item');
            tags.forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');

            currentFilter = fakeid;
            currentPage = 1;

            if (fakeid === '__favorite__') {
                await fetchFavorites(1);
            } else if (fakeid === '__watchlist__') {
                await fetchWatchlist(1);
            } else if (fakeid === '__standalone__') {
                standaloneOnly = true;
                currentFakeid = '';
                await fetchArticles(currentFakeid, 1);
            } else {
                standaloneOnly = false;
                currentFakeid = fakeid;
                await fetchArticles(currentFakeid, 1);
            }
            applyFilters();
        }

        async function fetchArticles(fakeid, page) {
            var grid = document.getElementById('articleGrid');
            grid.innerHTML = '<div class="loading-state"><span class="loading-spinner"></span>加载中...</div>';
            try {
                var url = '/api/rss/articles?page=' + (page || 1) + '&page_size=' + PAGE_SIZE;
                if (fakeid) {
                    url += '&fakeid=' + encodeURIComponent(fakeid);
                }
                if (showUnreadOnly) {
                    url += '&unread_only=true';
                }
                if (standaloneOnly) {
                    url += '&standalone_only=true';
                }
                var res = await fetch(url);
                var d = await res.json();
                if (!d.success) {
                    grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">加载失败</div></div>';
                    return;
                }
                allArticles = d.data || [];
                totalArticles = d.total || 0;
                totalPages = d.total_pages || 1;
                currentPage = d.page || 1;
            } catch (e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">网络错误: ' + escHtml(e.message) + '</div></div>';
            }
        }

        async function fetchFavorites(page) {
            var grid = document.getElementById('articleGrid');
            grid.innerHTML = '<div class="loading-state"><span class="loading-spinner"></span>加载中...</div>';
            try {
                var url = '/api/rss/marks/favorites?page=' + (page || 1) + '&page_size=' + PAGE_SIZE;
                var res = await fetch(url);
                var d = await res.json();
                if (!d.success) {
                    grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">加载失败</div></div>';
                    return;
                }
                allArticles = d.data || [];
                totalArticles = d.total || 0;
                totalPages = d.total_pages || 1;
                currentPage = d.page || 1;
            } catch (e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">网络错误: ' + escHtml(e.message) + '</div></div>';
            }
        }

        async function fetchWatchlist(page) {
            var grid = document.getElementById('articleGrid');
            grid.innerHTML = '<div class="loading-state"><span class="loading-spinner"></span>加载中...</div>';
            try {
                var url = '/api/rss/marks/watchlist?page=' + (page || 1) + '&page_size=' + PAGE_SIZE;
                var res = await fetch(url);
                var d = await res.json();
                if (!d.success) {
                    grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">加载失败</div></div>';
                    return;
                }
                allArticles = d.data || [];
                totalArticles = d.total || 0;
                totalPages = d.total_pages || 1;
                currentPage = d.page || 1;
            } catch (e) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">网络错误: ' + escHtml(e.message) + '</div></div>';
            }
        }

        async function loadArticles() {
            var urlParams = new URLSearchParams(window.location.search);
            var initFakeid = urlParams.get('fakeid') || '';

            try {
                var subRes = await fetch('/api/rss/subscriptions');
                var subData = await subRes.json();
                if (subData.success && subData.data) {
                    allSources = subData.data.map(function(s) {
                        return { fakeid: s.fakeid, nickname: s.nickname || s.fakeid };
                    });
                }

                // 按保存的自定义顺序排序
                allSources = applyCustomOrder(allSources);

                renderSidebar(initFakeid);

                if (initFakeid) {
                    currentFakeid = initFakeid;
                }
                await fetchArticles(currentFakeid, 1);
                applyFilters();
            } catch (e) {
                document.getElementById('articleGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">网络错误: ' + escHtml(e.message) + '</div></div>';
            }
            initialized = true;
        }

        var ORDER_KEY = 'reader.sidebar.order.v1';

        function getSavedOrder() {
            try {
                var raw = localStorage.getItem(ORDER_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) { return []; }
        }

        function saveOrder(fakeids) {
            try { localStorage.setItem(ORDER_KEY, JSON.stringify(fakeids)); } catch (e) {}
        }

        function applyCustomOrder(sources) {
            // 后端 list_subscriptions 已经按 sort_order 返回，这里通常不需要再调整。
            // localStorage 仅作为后端未保存过排序时的降级兜底（比如老版本升级的过渡期）。
            var saved = getSavedOrder();
            if (!saved.length) return sources;

            // 如果后端返回的顺序和 localStorage 一致，说明已同步，直接用后端的
            var backendOrder = sources.map(function(s) { return s.fakeid; }).join(',');
            var localOrder = saved.join(',');
            if (backendOrder === localOrder) return sources;

            // 不一致时也优先用后端顺序（多设备场景，其他设备可能改过）
            // 只在后端顺序看起来是"未排序状态"（所有项按原顺序）时，才应用 localStorage
            // 这里简单策略：直接返回后端顺序
            return sources;
        }

        function renderSidebar(initFakeid) {
            var list = document.getElementById('filterList');
            var html = '';
            var all = !initFakeid && !standaloneOnly;
            // 固定项（不可拖）：全部 → 收藏 → 待看 → 单篇
            html += '<div class="filter-item' + (all ? ' active' : '') + '" data-fakeid="" onclick="filterBy(this, \'\')">';
            html += '<span class="filter-item-name">全部</span></div>';
            html += '<div class="filter-item" data-filter="favorite" onclick="filterBy(this, \'__favorite__\')">';
            html += '<span class="filter-item-name">收藏</span></div>';
            html += '<div class="filter-item" data-filter="watchlist" onclick="filterBy(this, \'__watchlist__\')">';
            html += '<span class="filter-item-name">待看</span></div>';
            html += '<div class="filter-item" data-fakeid="__standalone__" onclick="filterBy(this, \'__standalone__\')">';
            html += '<span class="filter-item-name">单篇</span></div>';

            if (allSources.length > 0) {
                html += '<div class="filter-divider"></div>';
                allSources.forEach(function(s) {
                    var isActive = (s.fakeid === initFakeid) ? ' active' : '';
                    html += '<div class="filter-item draggable' + isActive + '" data-fakeid="' + escHtml(s.fakeid) + '" ' +
                            'onclick="filterBy(this, \'' + escHtml(s.fakeid) + '\')">';
                    html += '<span class="drag-handle">⋮⋮</span>';
                    html += '<span class="filter-item-name">' + escHtml(s.nickname) + '</span>';
                    html += '</div>';
                });
            }
            list.innerHTML = html;
            attachDragHandlers();
        }

        var sortMode = false;
        function toggleSortMode() {
            sortMode = !sortMode;
            var sidebar = document.getElementById('filterSidebar');
            var btn = document.getElementById('sortToggle');
            if (sortMode) {
                sidebar.classList.add('sorting');
                btn.classList.add('active');
                btn.textContent = '完成';
            } else {
                sidebar.classList.remove('sorting');
                btn.classList.remove('active');
                btn.textContent = '排序';
            }
        }

        function attachDragHandlers() {
            var items = document.querySelectorAll('.filter-item.draggable');
            var dragged = null;

            items.forEach(function(item) {
                item.setAttribute('draggable', 'true');

                item.addEventListener('dragstart', function(e) {
                    if (!sortMode) { e.preventDefault(); return; }
                    dragged = item;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', function() {
                    item.classList.remove('dragging');
                    items.forEach(function(i) { i.classList.remove('drag-over'); });
                    dragged = null;
                    persistOrderFromDom();
                });

                item.addEventListener('dragover', function(e) {
                    if (!sortMode || !dragged || dragged === item) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                item.addEventListener('dragenter', function(e) {
                    if (!sortMode || !dragged || dragged === item) return;
                    item.classList.add('drag-over');
                });

                item.addEventListener('dragleave', function() {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', function(e) {
                    if (!sortMode || !dragged || dragged === item) return;
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    // 插到目标前面
                    item.parentNode.insertBefore(dragged, item);
                });
            });
        }

        function persistOrderFromDom() {
            var ids = [];
            document.querySelectorAll('.filter-item.draggable').forEach(function(i) {
                ids.push(i.dataset.fakeid);
            });
            // 1. 先写 localStorage 作为降级兜底
            saveOrder(ids);
            // 2. 同步 allSources 内存顺序
            var map = {};
            allSources.forEach(function(s) { map[s.fakeid] = s; });
            allSources = ids.map(function(id) { return map[id]; }).filter(Boolean);
            // 3. 调后端 API 持久化（跨设备同步）
            fetch('/api/rss/subscriptions/reorder', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fakeids: ids })
            }).catch(function() {
                // 网络失败就用 localStorage 的数据，下次刷新本机仍然保留
            });
        }

        function applyFilters() {
            renderArticles(allArticles);
            updateUnreadCount();
        }

        async function toggleUnread() {
            showUnreadOnly = !showUnreadOnly;
            currentPage = 1;
            var btn = document.getElementById('unreadBtn');
            if (showUnreadOnly) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            await fetchArticles(currentFakeid, 1);
            applyFilters();
        }

        async function updateUnreadCount() {
            try {
                var res = await fetch('/api/rss/unread/count');
                var d = await res.json();
                if (!d.success) return;
                var count = 0;
                if (currentFakeid) {
                    count = (d.by_fakeid && d.by_fakeid[currentFakeid]) || 0;
                } else {
                    count = d.count || 0;
                }
                var el = document.getElementById('unreadCount');
                if (count > 0) {
                    el.textContent = count > 99 ? '99+' : count;
                    el.style.display = '';
                } else {
                    el.style.display = 'none';
                }
            } catch (e) {}
        }

        async function markCurrentRead() {
            var desc = currentFakeid ? '确定将该公众号的文章全部标记为已读？' : '确定将所有文章标记为已读？';
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('visible');
        }

        async function confirmMarkRead() {
            closeModal();
            var url = '/api/rss/read/all';
            if (currentFakeid) {
                url += '?fakeid=' + encodeURIComponent(currentFakeid);
            }
            try {
                await fetch(url, { method: 'POST' });
                // 重新加载当前页
                await fetchArticles(currentFakeid, currentPage);
                applyFilters();
            } catch (e) {}
        }

        window.addEventListener('load', loadArticles);

        window.addEventListener('pageshow', async function(event) {
            if (!initialized) return;
            if (currentFilter === '__favorite__') {
                await fetchFavorites(currentPage);
            } else if (currentFilter === '__watchlist__') {
                await fetchWatchlist(currentPage);
            } else {
                await fetchArticles(currentFakeid, currentPage);
            }
            applyFilters();
        });
    </script>
</body>
